<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="分貝計">
    <meta name="theme-color" content="#0f172a">
    
    <title>實時分貝顯示器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            /* 禁止文字選取，提升 App 感 */
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .db-glow {
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.5);
        }
        .progress-ring {
            transition: stroke-dashoffset 0.1s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
        .meter-container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* 適應 iPhone X 以上的瀏海區域 */
        .safe-area-inset {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
</head>
<body>

    <div class="flex flex-col items-center justify-center w-full max-w-md px-6 safe-area-inset">
        <div class="meter-container w-full aspect-square rounded-full p-8 flex flex-col items-center justify-center relative shadow-2xl">
            
            <svg class="absolute inset-0 w-full h-full p-4" viewBox="0 0 100 100">
                <circle class="text-slate-800" stroke-width="4" stroke="currentColor" fill="transparent" r="45" cx="50" cy="50"/>
                <circle id="progressCircle" class="progress-ring text-sky-500" stroke-width="4" stroke-dasharray="282.7" stroke-dashoffset="282.7" stroke-linecap="round" stroke="currentColor" fill="transparent" r="45" cx="50" cy="50"/>
            </svg>

            <div class="z-10 text-center">
                <span id="dbValue" class="text-8xl font-black db-glow leading-none">0</span>
                <span class="block text-xl font-semibold text-sky-400 mt-2 tracking-widest">dB</span>
            </div>

            <div class="absolute bottom-16 z-10 text-center">
                <p class="text-slate-400 text-sm uppercase tracking-tighter">平均分貝值</p>
                <p id="avgDbValue" class="text-lg font-medium text-slate-200 mt-1">--</p>
            </div>
        </div>

        <div class="mt-12 w-full space-y-6 text-center">
            <button id="toggleBtn" class="bg-sky-500 hover:bg-sky-400 text-white font-bold py-4 px-8 rounded-2xl transition-all active:scale-95 shadow-lg shadow-sky-500/20 w-full text-lg">
                開啟麥克風
            </button>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-800/50 p-4 rounded-xl border border-white/5">
                    <p class="text-xs text-slate-400 uppercase">最高峰值</p>
                    <p id="peakDb" class="text-xl font-bold text-rose-400">0 dB</p>
                </div>
                <div class="bg-slate-800/50 p-4 rounded-xl border border-white/5">
                    <p class="text-xs text-slate-400 uppercase">環境狀態</p>
                    <p id="statusLabel" class="text-xl font-bold text-emerald-400">待機中</p>
                </div>
            </div>
        </div>
        
        <p class="mt-8 text-slate-500 text-[10px] text-center px-4 opacity-50">
            請點擊瀏覽器選單並選擇「加入主畫面」以作為 App 使用
        </p>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-rose-500 text-white px-6 py-3 rounded-full shadow-xl opacity-0 transition-opacity pointer-events-none z-50 text-sm text-center">
        請允許麥克風權限
    </div>

    <script>
        
        // 自動生成 Manifest 讓行動裝置識別為 App
        const manifest = {
            "name": "實時分貝計",
            "short_name": "分貝計",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#0f172a",
            "theme_color": "#0f172a",
            "icons": [{
                "src": "https://placehold.co/512x512/0ea5e9/ffffff?text=dB",
                "sizes": "512x512",
                "type": "image/png"
            }]
        };
        const stringManifest = JSON.stringify(manifest);
        const blob = new Blob([stringManifest], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(blob);
        const link = document.createElement('link');
        link.rel = 'manifest';
        link.href = manifestURL;
        document.head.appendChild(link);

        let audioContext;
        let analyser;
        let microphone;
        let isRunning = false;
        let dbHistory = [];
        let peakDb = 0;

        const dbDisplay = document.getElementById('dbValue');
        const avgDbDisplay = document.getElementById('avgDbValue');
        const peakDbDisplay = document.getElementById('peakDb');
        const statusLabel = document.getElementById('statusLabel');
        const toggleBtn = document.getElementById('toggleBtn');
        const progressCircle = document.getElementById('progressCircle');
        const toast = document.getElementById('toast');

        async function startMeter() {
            if (!window.isSecureContext) {
                showToast("錯誤：麥克風需要 HTTPS 環境。");
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(stream);
                
                analyser.fftSize = 512;
                analyser.smoothingTimeConstant = 0.3;
                
                microphone.connect(analyser);
                
                isRunning = true;
                toggleBtn.textContent = '停止測量';
                toggleBtn.classList.replace('bg-sky-500', 'bg-rose-500');
                toggleBtn.classList.replace('hover:bg-sky-400', 'hover:bg-rose-400');
                
                processAudio();
            } catch (err) {
                showToast("無法存取麥克風。請確認權限已開啟。");
            }
        }

        function stopMeter() {
            if (audioContext && audioContext.state !== 'closed') {
                audioContext.close();
            }
            isRunning = false;
            toggleBtn.textContent = '開啟麥克風';
            toggleBtn.classList.replace('bg-rose-500', 'bg-sky-500');
            toggleBtn.classList.replace('hover:bg-rose-400', 'hover:bg-sky-400');
            
            dbDisplay.textContent = '0';
            avgDbDisplay.innerHTML = '--';
            statusLabel.textContent = '待機中';
            updateCircle(0);
        }

        function processAudio() {
            if (!isRunning) return;

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            
            const update = () => {
                if (!isRunning) return;
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for (let i = 0; i < bufferLength; i++) sum += dataArray[i];
                let average = sum / bufferLength;
                let db = Math.round(average > 0 ? (20 * Math.log10(average)) + 25 : 0);
                
                if (db < 0) db = 0;
                if (db > 120) db = 120;

                dbDisplay.textContent = db;
                dbHistory.push(db);
                if (dbHistory.length > 50) dbHistory.shift();
                
                const avg = Math.round(dbHistory.reduce((a, b) => a + b) / dbHistory.length);
                avgDbDisplay.innerHTML = `${avg} dB (L<sub>eq</sub>)`;

                if (db > peakDb) {
                    peakDb = db;
                    peakDbDisplay.textContent = `${peakDb} dB`;
                }

                updateCircle(db);
                updateStatus(db);
                requestAnimationFrame(update);
            };
            update();
        }

        function updateCircle(db) {
            const radius = 45;
            const circumference = 2 * Math.PI * radius;
            const percentage = Math.min(db / 100, 1);
            const offset = circumference - (percentage * circumference);
            progressCircle.style.strokeDashoffset = offset;
            
            if (db < 50) progressCircle.setAttribute('class', 'progress-ring text-emerald-400');
            else if (db < 80) progressCircle.setAttribute('class', 'progress-ring text-amber-400');
            else progressCircle.setAttribute('class', 'progress-ring text-rose-500');
        }

        function updateStatus(db) {
            if (db < 30) { statusLabel.textContent = "非常安靜"; statusLabel.className = "text-xl font-bold text-emerald-400"; }
            else if (db < 50) { statusLabel.textContent = "安靜"; statusLabel.className = "text-xl font-bold text-emerald-500"; }
            else if (db < 70) { statusLabel.textContent = "普通說話"; statusLabel.className = "text-xl font-bold text-sky-400"; }
            else if (db < 85) { statusLabel.textContent = "吵雜"; statusLabel.className = "text-xl font-bold text-amber-500"; }
            else { statusLabel.textContent = "極其吵雜"; statusLabel.className = "text-xl font-bold text-rose-500"; }
        }

        function showToast(msg) {
            toast.textContent = msg;
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 5000);
        }

        toggleBtn.addEventListener('click', () => {
            if (isRunning) stopMeter();
            else startMeter();
        });
    </script>
</body>
</html>
